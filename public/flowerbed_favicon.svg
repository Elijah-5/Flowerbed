<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Flowerbed darknet icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="13.5" fill="none" stroke="#374151"/>

  <!-- onion/relay rings -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#94a3b8" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#94a3b8" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- flowerbed petals -->
  <path d="M32 18
           C27 20,24 25,24 29
           C24 34,28 36,32 34
           C36 36,40 34,40 29
           C40 25,37 20,32 18Z"
        fill="url(#petal)"/>
  <path d="M18 32
           C20 27,25 24,29 24
           C34 24,36 28,34 32
           C36 36,34 40,29 40
           C25 40,20 37,18 32Z"
        fill="url(#petal)" transform="rotate(90 32 32)"/>
  <circle cx="32" cy="32" r="6" fill="#f5f3ff"/>

  <!-- subtle relay nodes -->
  <circle cx="32" cy="15" r="2" fill="#a78bfa"/>
  <circle cx="49" cy="32" r="2" fill="#a78bfa"/>
  <circle cx="32" cy="49" r="2" fill="#a78bfa"/>
  <circle cx="15" cy="32" r="2" fill="#a78bfa"/>

  <!-- root / bed -->
  <path d="M22 46 C26 42,38 42,42 46" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 38 L32 46" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
</svg>
